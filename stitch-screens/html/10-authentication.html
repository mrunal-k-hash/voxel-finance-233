<!-- STITCH_SHADER_START:ANIMATION_3 class="absolute inset-0 w-full h-full z-0 opacity-50" -->
<div class="absolute inset-0 w-full h-full z-0 opacity-50" style="display:block;">
<canvas id="shader-canvas-ANIMATION_3" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_3');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;

void main() {
    vec2 uv = v_texCoord;
    float time = u_time * 0.2;
    
    // Create organic flowing movement
    float noise = sin(uv.x * 3.0 + time) * cos(uv.y * 2.0 - time) * 0.5 + 0.5;
    float noise2 = sin(uv.y * 4.0 - time * 0.8) * cos(uv.x * 3.0 + time * 1.2) * 0.5 + 0.5;
    
    // Deep Finance Navy
    vec3 color1 = vec3(0.055, 0.082, 0.067); // Surface-low
    // Emerald Accent
    vec3 color2 = vec3(0.063, 0.725, 0.506); // Primary
    // Electric Blue Accent
    vec3 color3 = vec3(0.0, 0.4, 0.9);
    
    float mixFactor = smoothstep(0.3, 0.7, noise * noise2 + uv.y * 0.2);
    vec3 finalColor = mix(color1, color2 * 0.15, mixFactor);
    finalColor = mix(finalColor, color3 * 0.1, smoothstep(0.8, 1.0, noise2) * 0.5);
    
    // Add subtle grain/shimmer
    float grain = fract(sin(dot(uv, vec2(12.9898, 78.233))) * 43758.5453);
    finalColor += grain * 0.02;

    gl_FragColor = vec4(finalColor, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<script>
        function toggleFlow(flowId) {
            const loginFlow = document.getElementById('login-flow');
            const regFlow = document.getElementById('registration-flow');

            if (flowId === 'registration-flow') {
                loginFlow.classList.add('hidden-flow');
                loginFlow.classList.remove('fade-in');
                
                regFlow.style.display = 'block';
                setTimeout(() => {
                    regFlow.classList.remove('hidden-flow');
                    regFlow.classList.add('fade-in');
                }, 50);
            } else {
                regFlow.classList.add('hidden-flow');
                regFlow.classList.remove('fade-in');
                
                loginFlow.style.display = 'block';
                setTimeout(() => {
                    loginFlow.classList.remove('hidden-flow');
                    loginFlow.classList.add('fade-in');
                }, 50);
            }
        }

        // Add subtle mouse-follow parallax effect to the card
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.glass-card');
            const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            
            cards.forEach(card => {
                if (!card.classList.contains('hidden-flow')) {
                    card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                }
            });
        });

        // Initialize state
        document.getElementById('registration-flow').style.display = 'none';
    </script>
